<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: cornflowerblue;
        }
        
        div {
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de formulario</h1>
    <form action="cadastro.js" method="post" autocomplete="on">
        <fieldset>
            <legend>Sexo</legend>
            <input type="radio" checked name="sexo" id="sxmas" value="M"><label for="sxmas">Masculino</label> <br>
            <input type="radio" name="sexo" id="sxfem" value="F"><label for="sxfem">Feminino</label> <br>
        </fieldset>
        <fieldset>
            <legend>Esportes Favoritos</legend>
            <input type="checkbox" checked name="futebol" id="futebol"><label for="futebol">Futebol</label> <br>
            <input type="checkbox" name="basquete" id="basquete"><label for="basquete">basquete</label> <br>
            <input type="checkbox" name="volei" id="volei"><label for="volei">volei</label> <br>
            <input type="checkbox" name="tenisdemesa" id="tenisdemesa"><label for="tenisdemesa">Tenis de mesa</label> <br>

        </fieldset>

        <div>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </div>
    </form>
</body>
</html>
