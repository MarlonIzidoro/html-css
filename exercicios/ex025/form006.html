<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <style>
        div {
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Formulario</h1>
    <form action="cadastro.js" method="post" autocomplete="on">
        <div>
            <label for="cor">Cor:</label>
            <input type="color" name="cor" id="cor" value="#00ff00">
        </div>

        <div>
            <label for="nivel">Nivel de Satisfação</label>
            <input type="range" name="nivel" id="nivel" min="1" max="10" value="5">
        </div>

        <div>
            <label for="foto">Foto de perfil:</label>
            <input type="file" name="foto" id="foto">
        </div>

        <div>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </div>
    </form>
</body>
</html>
